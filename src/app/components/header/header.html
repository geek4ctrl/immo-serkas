<header class="header">
  <div class="header-top">
    <a routerLink="/home" class="logo" (click)="closeMenu()">
      <span class="logo-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </span>
      <span class="logo-text">IMMO <span class="logo-sub">SERKAS</span></span>
    </a>
    <button
      type="button"
      class="menu-toggle"
      (click)="toggleMenu()"
      [class.is-open]="menuOpen"
      [attr.aria-expanded]="menuOpen"
      aria-controls="primary-nav"
      aria-label="Toggle navigation"
    >
      <span class="menu-bar"></span>
      <span class="menu-bar"></span>
      <span class="menu-bar"></span>
    </button>
  </div>
  <nav class="nav" id="primary-nav" [class.is-open]="menuOpen">
    <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">{{ langService.isEn() ? 'Home' : 'Accueil' }}</a>
    <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">{{ langService.isEn() ? 'About Us' : 'À propos' }}</a>
    <a routerLink="/services" routerLinkActive="active" (click)="closeMenu()">{{ langService.isEn() ? 'Services' : 'Services' }}</a>
    <a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">{{ langService.isEn() ? 'Contact' : 'Contact' }}</a>
    <div class="lang-dropdown">
      <select [value]="langService.currentLang()" (change)="onLangChange($event)" class="lang-select" aria-label="Language">
        <option value="en">English</option>
        <option value="fr">Français</option>
      </select>
    </div>
  </nav>
</header>
